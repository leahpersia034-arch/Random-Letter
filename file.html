<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Random Letter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"
        rel="stylesheet" />
    <title>Document</title>
</head>

<body>
    <!-- Envelope Screen -->
    <div id="envelope-container">
        <img src="Envelope.png" alt="Envelope" id="envelope" />
        <p>♡ Letter for You ♡</p>
    </div>

    <!-- Letter Screen -->
    <div id="letter-container">
        <div class="letter-window">
            <h1 id="letter-title">Are you ready to be a 3rd year student?</h1>

            <img src="question.gif" class="cat" id="letter-cat" />

            <div class="buttons" id="letter-buttons">
                <img src="YES.png" class="btn yes-btn" alt="Yes" />

                <div class="no-wrapper">
                    <img src="NO.png" class="btn no-btn" alt="No" />
                </div>
            </div>

            <p id="final-text" class="final-text" style="display: none">
                <strong>Congratulations!!</strong> You are now sure to be a 3rd year student! Goodluck and Padayon!!
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
